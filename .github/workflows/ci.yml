name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff
        run: |
          ruff check .

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy
      - name: Run mypy for src.backend
        run: |
          mypy -p src.backend

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests with coverage
        run: |
          pytest \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=80
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Start Docker Compose
        run: |
          docker compose up -d --build
      - name: Wait for Guardio metrics endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -sS http://localhost:8000/metrics/prometheus >/dev/null 2>&1; then echo "metrics up"; exit 0; fi
            sleep 1
          done
          echo "metrics endpoint did not start"; exit 1
      - name: Check Prometheus targets
        run: |
          curl -sS http://localhost:9090/-/healthy || true
          curl -sS http://localhost:9090/api/v1/targets || true
      - name: Tear down compose
        if: always()
        run: |
          docker compose down
